name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Inject release version
        run: |
          sed -i "s|__VERSION__|${GITHUB_REF_NAME}|g" src/index.html

      - name: Build
        run: |
          npm run build:web
          npm run build:cli

      - name: Create CLI artifact
        run: |
          mkdir -p release/cli
          cp dist-cli/cli.js "release/cli/linkedin-to-json-resume"
          chmod +x "release/cli/linkedin-to-json-resume"
          tar -cJf release/cli.tar.xz -C release/cli linkedin-to-json-resume

      - name: Create web artifact
        run: |
          mkdir -p release/web
          cp -r dist/* release/web/
          tar -cJf release/web.tar.xz -C release/web .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/cli.tar.xz
            release/web.tar.xz
          generate_release_notes: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
